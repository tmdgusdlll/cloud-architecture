name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Build and Test with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/arm64 \
            -t ${{ vars.DOCKER_USERNAME }}/cloud-architecture:${{ steps.vars.outputs.short_sha }} \
            -t ${{ vars.DOCKER_USERNAME }}/cloud-architecture:latest \
            .
          docker push ${{ vars.DOCKER_USERNAME }}/cloud-architecture:${{ steps.vars.outputs.short_sha }}
          docker push ${{ vars.DOCKER_USERNAME }}/cloud-architecture:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      #  1.오토스케일링으로 켜질 새 서버를 위해 시작 템플릿 업데이트 (필수)
      - name: Update Launch Template
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          LAUNCH_TEMPLATE_ID: ${{ vars.LAUNCH_TEMPLATE_ID }}
        run: |
          USER_DATA=$(cat <<'USERDATA' | sed "s|__IMAGE_TAG__|${IMAGE_TAG}|g; s|__DOCKER_USERNAME__|${DOCKER_USERNAME}|g" | base64 -w 0
          #!/bin/bash
          set -e
          AWS_REGION="ap-northeast-2"
          DOCKER_USERNAME="__DOCKER_USERNAME__"
          IMAGE_NAME="cloud-architecture"
          IMAGE_TAG="__IMAGE_TAG__"

          dnf update -y
          dnf install -y docker
          systemctl enable docker
          systemctl start docker

          DOCKER_TOKEN=$(aws ssm get-parameter \
            --name "/cloud-architecture/prod/DOCKER_TOKEN" \
            --with-decryption \
            --query "Parameter.