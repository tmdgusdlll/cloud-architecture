name: CI/CD Pipeline (Level 4)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build and Test with Gradle
        env:
          # 1. AWS 가짜 신분증
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: dummy-access-key
          AWS_SECRET_ACCESS_KEY: dummy-secret-key
          # 2. application.yml 빈칸 채우기용 가짜 데이터
          DB_HOST: dummy-db-host
          DB_PORT: 3306
          DB_NAME: dummy-db
          DB_USERNAME: dummy-user
          DB_PASSWORD: dummy-password
          TEAM_NAME: dummy-team-name
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-architecture:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/cloud-architecture:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cloud-architecture:latest
            
            sudo docker stop cloud-architecture || true
            sudo docker rm cloud-architecture || true
            
            sudo docker run -d -p 8080:8080 --name cloud-architecture -e SPRING_PROFILES_ACTIVE=prod ${{ secrets.DOCKER_USERNAME }}/cloud-architecture:latest