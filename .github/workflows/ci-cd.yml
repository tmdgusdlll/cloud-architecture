name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Build and Test with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build --platform linux/arm64 \
            -t ${{ vars.DOCKER_USERNAME }}/cloud-architecture:${{ steps.vars.outputs.short_sha }} \
            -t ${{ vars.DOCKER_USERNAME }}/cloud-architecture:latest \
            .
          docker push ${{ vars.DOCKER_USERNAME }}/cloud-architecture:${{ steps.vars.outputs.short_sha }}
          docker push ${{ vars.DOCKER_USERNAME }}/cloud-architecture:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Update Launch Template
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
          LAUNCH_TEMPLATE_ID: ${{ vars.LAUNCH_TEMPLATE_ID }}
        run: |
          USER_DATA=$(cat <<'USERDATA' | sed "s|__IMAGE_TAG__|${IMAGE_TAG}|g; s|__DOCKER_USERNAME__|${DOCKER_USERNAME}|g" | base64 -w 0
          #!/bin/bash
          set -e
          AWS_REGION="ap-northeast-2"
          DOCKER_USERNAME="__DOCKER_USERNAME__"
          IMAGE_NAME="cloud-architecture"
          IMAGE_TAG="__IMAGE_TAG__"

          dnf update -y
          dnf install -y docker
          systemctl enable docker
          systemctl start docker

          DOCKER_TOKEN=$(aws ssm get-parameter \
            --name "/cloud-architecture/prod/DOCKER_TOKEN" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ${AWS_REGION})

          echo $DOCKER_TOKEN | docker login -u $DOCKER_USERNAME --password-stdin

          docker pull ${DOCKER_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}
          docker run -d -p 8080:8080 \
            --restart unless-stopped \
            --name cloud-architecture \
            -e SPRING_PROFILES_ACTIVE=prod \
            ${DOCKER_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}
          USERDATA
          )

          NEW_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id ${LAUNCH_TEMPLATE_ID} \
            --source-version '$Latest' \
            --launch-template-data "{\"UserData\":\"${USER_DATA}\"}" \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)

          aws ec2 modify-launch-template \
            --launch-template-id ${LAUNCH_TEMPLATE_ID} \
            --default-version ${NEW_VERSION}

          echo "✅ Launch Template v${NEW_VERSION} 업데이트 완료"

      - name: Start Instance Refresh
        id: refresh
        env:
          ASG_NAME: ${{ vars.ASG_NAME }}
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${ASG_NAME} \
            --preferences '{
              "MinHealthyPercentage": 100,
              "InstanceWarmup": 120
            }' \
            --query 'InstanceRefreshId' \
            --output text)

          echo "refresh_id=${REFRESH_ID}" >> $GITHUB_OUTPUT
          echo "✅ Instance Refresh 시작: ${REFRESH_ID}"

      - name: Wait for Instance Refresh
        env:
          ASG_NAME: ${{ vars.ASG_NAME }}
          REFRESH_ID: ${{ steps.refresh.outputs.refresh_id }}
        run: |
          for i in $(seq 1 60); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${ASG_NAME}" \
              --instance-refresh-ids ${REFRESH_ID} \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            echo "시도 ${i}/60 - 상태: ${STATUS}"

            if [ "${STATUS}" = "Successful" ]; then
              echo "✅ 배포 완료!"
              exit 0
            elif [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ]; then
              echo "❌ 배포 실패: ${STATUS}"
              exit 1
            fi
            sleep 30
          done
          echo "❌ 타임아웃"
          exit 1
